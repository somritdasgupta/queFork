name: Build & Deploy
on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Lint code
              run: npm run lint

            - name: Run tests
              run: npm test

            - name: Build project
              run: npm run build

            - name: Create deployment summary
              if: always()
              run: |
                  echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
                  echo "- Build: ✅ Success" >> $GITHUB_STEP_SUMMARY
                  echo "- Tests: ✅ Passed" >> $GITHUB_STEP_SUMMARY
                  echo "- Deployment: Managed by Vercel Git Integration" >> $GITHUB_STEP_SUMMARY
