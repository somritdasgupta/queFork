name: Build Validation (Vercel Auto Deploy)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: deployment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove local Vercel metadata
        run: rm -rf .vercel

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build

      - name: CI summary
        if: always()
        run: |
          echo "## Build Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Type check: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Vercel deploy: handled automatically by Vercel Git Integration" >> $GITHUB_STEP_SUMMARY
