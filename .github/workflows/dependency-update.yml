name: Auto Dependency Update

on:
  schedule:
    # Every Monday at 6:00 AM UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Check for outdated packages
        id: outdated
        run: |
          echo "## Outdated Packages" > outdated-report.md
          npm outdated --json > outdated.json 2>/dev/null || true
          if [ -s outdated.json ] && [ "$(cat outdated.json)" != "{}" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            node -e "
              const data = require('./outdated.json');
              const lines = Object.entries(data).map(([pkg, info]) =>
                '| ' + pkg + ' | ' + info.current + ' | ' + info.wanted + ' | ' + info.latest + ' |'
              );
              console.log('| Package | Current | Wanted | Latest |');
              console.log('|---------|---------|--------|--------|');
              lines.forEach(l => console.log(l));
            " >> outdated-report.md
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "All dependencies are up to date! ✅" >> outdated-report.md
          fi

      - name: Update dependencies (non-breaking)
        if: steps.outdated.outputs.has_updates == 'true'
        run: |
          # Update to latest compatible versions (respects semver ranges)
          npm update

      - name: Run type check
        if: steps.outdated.outputs.has_updates == 'true'
        run: npx tsc --noEmit
        id: typecheck

      - name: Run build
        if: steps.outdated.outputs.has_updates == 'true'
        run: npm run build
        id: build

      - name: Run tests
        if: steps.outdated.outputs.has_updates == 'true'
        run: npm test -- --run
        id: tests

      - name: Create Pull Request
        id: create_pr
        if: steps.outdated.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): auto-update dependencies"
          title: "📦 Auto Dependency Update"
          body: |
            ## Automated Dependency Update

            ${{ steps.outdated.outputs.has_updates == 'true' && '### Outdated Packages Report' || 'All up to date!' }}

            ### Verification Results

            | Check | Status |
            |-------|--------|
            | TypeScript | ${{ steps.typecheck.outcome == 'success' && '✅ Pass' || '⚠️ Issues found' }} |
            | Build | ${{ steps.build.outcome == 'success' && '✅ Pass' || '❌ Failed' }} |
            | Tests | ${{ steps.tests.outcome == 'success' && '✅ Pass' || '⚠️ Check results' }} |

            > Auto-generated by queFork dependency bot 🤖
          branch: auto-deps/weekly-update
          delete-branch: true
          labels: |
            dependencies
            automated

      - name: Enable Pull Request Auto-merge
        if: steps.create_pr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.create_pr.outputs.pull-request-number }}
          merge-method: squash
