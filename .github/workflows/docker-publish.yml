name: Docker Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine push policy
        id: push_policy
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "strict=true" >> "$GITHUB_OUTPUT"
            echo "mode=release-tag" >> "$GITHUB_OUTPUT"
          else
            echo "strict=false" >> "$GITHUB_OUTPUT"
            echo "mode=branch-validation" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container Registry (retry)
        id: ghcr_login
        shell: bash
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "Attempt ${attempt}: logging into ${REGISTRY}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin
            if [ $? -eq 0 ]; then
              echo "ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep $((attempt * 10))
          done

          if [[ "${{ steps.push_policy.outputs.strict }}" == "true" ]]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::error::GHCR login failed for a release tag run. Failing workflow."
            exit 1
          fi

          echo "ok=false" >> "$GITHUB_OUTPUT"
          echo "::warning::GHCR login failed after retries. Building image without pushing this run."
          exit 0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ steps.ghcr_login.outputs.ok == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate build summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | \`${{ steps.push_policy.outputs.mode }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Push strict | \`${{ steps.push_policy.outputs.strict }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Push attempted | \`${{ steps.ghcr_login.outputs.ok == 'true' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | ${{ steps.meta.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.meta.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
