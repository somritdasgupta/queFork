name: Cleanup Old Packages

on:
    workflow_dispatch:
        inputs:
            keep_latest:
                description: "Number of latest versions to keep"
                required: false
                default: "3"
                type: string
            dry_run:
                description: "Dry run (list but don't delete)"
                required: false
                default: true
                type: boolean

permissions:
    packages: write

jobs:
    cleanup:
        runs-on: ubuntu-latest
        steps:
            - name: Delete old container versions
              uses: actions/delete-package-versions@v5
              with:
                  package-name: quefork
                  package-type: container
                  min-versions-to-keep: ${{ inputs.keep_latest }}
                  delete-only-untagged-versions: "false"

            - name: Summary
              run: |
                  echo "### Package Cleanup" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
                  echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
                  echo "| Kept latest | ${{ inputs.keep_latest }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| Dry run | ${{ inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
